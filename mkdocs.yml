site_name: MCP SQL Bridge
site_description: Give your AI read-only access to SQLite, PostgreSQL, and MySQL over the Model Context Protocol.
site_url: https://firas-mcp-servers.github.io/mcp-sql-bridge/
repo_url: https://github.com/firas-mcp-servers/mcp-sql-bridge
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Security: SECURITY.md
  - Error taxonomy: ERROR_TAXONOMY.md
  - Pricing & licensing: PRICING_AND_LICENSING.md
  - Roadmap:
      - Future ideas: FUTURE.md
      - Sprint plan: SPRINT_PLAN.md
      - 1.0 Release criteria: RELEASE_CRITERIA.md
  - Operations:
      - Deprecation & support: DEPRECATION_AND_SUPPORT.md
  - Distribution:
      - MCP registry: MCP_REGISTRY.md
      - GitHub Pages / Vercel: GITHUB_PAGES.md
      - Repo topics: REPO_TOPICS.md
      - Announcement: ANNOUNCEMENT.md
  - Contribution: CONTRIBUTING.md

docs_dir: docs
site_dir: site

plugins:
  - search
